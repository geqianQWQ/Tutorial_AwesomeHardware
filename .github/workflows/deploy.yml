name: Deploy VitePress

# 推送到 main 即自动构建并部署到 GitHub Pages。
# 首次使用前：仓库 Settings → Pages → Source 选「GitHub Actions」。
# 站点地址：https://awesome-embedded-learning-studio.github.io/Tutorial_AwesomeHardware/
# （对应 config.ts 的 base: '/Tutorial_AwesomeHardware/'）

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同时只跑一个部署，避免并发覆盖；排队中的不取消，保证最终一致。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # lastUpdated 需要完整 git 历史

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
